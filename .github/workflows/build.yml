name: Build report PDF

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile with XeLaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_xelatex: true
          # 模板写死 \setmainfont{Times New Roman}(Windows 专有字体,云端没有)。
          # 装等宽兼容的 Liberation Serif,并用 fontconfig 把 "Times New Roman" 解析到它。
          # 仅改 CI 环境,不动模板;Liberation 与 Times 度量一致,排版不变。
          pre_compile: |
            apk add --no-cache fontconfig font-liberation 2>/dev/null || apk add --no-cache fontconfig ttf-liberation
            mkdir -p /etc/fonts
            printf '%s\n' \
              '<?xml version="1.0"?>' \
              '<!DOCTYPE fontconfig SYSTEM "fonts.dtd">' \
              '<fontconfig>' \
              '  <match target="pattern"><test name="family"><string>Times New Roman</string></test>' \
              '  <edit name="family" mode="assign" binding="strong"><string>Liberation Serif</string></edit></match>' \
              '</fontconfig>' > /etc/fonts/local.conf
            fc-cache -f

      - name: Upload PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: report-pdf
          path: main.pdf

      - name: Publish to "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: 最新编译 PDF
          files: main.pdf
