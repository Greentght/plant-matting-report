name: Build report PDF

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile with XeLaTeX
        id: compile
        continue-on-error: true
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_xelatex: true
          # 模板写死 \setmainfont{Times New Roman}(Windows 专有字体,云端没有)。
          # 装等宽兼容的 Liberation Serif,并用 fontconfig 把 "Times New Roman" 解析到它。
          # 仅改 CI 环境,不动模板;Liberation 与 Times 度量一致,排版不变。
          pre_compile: |
            # 模板按老 ctex 写,新版 ctex(2.5.10)选项更严:① heading=true 后不能紧跟宏;
            # ② UTF8 不再是 ctex 宏包选项(默认即 UTF8)。一次性重排:去 UTF8、heading 落末尾。
            # 仅改 CI 临时副本,仓库模板不动;zihao/fontset 保留,排版不变。
            sed -i 's/zihao=-4,UTF8,heading=true\\HGP@fontset/zihao=-4\\HGP@fontset,heading=true/' HustGraduPaper.cls
            apk add --no-cache fontconfig font-liberation 2>/dev/null || apk add --no-cache fontconfig ttf-liberation || true
            mkdir -p /etc/fonts
            printf '%s\n' \
              '<?xml version="1.0"?>' \
              '<!DOCTYPE fontconfig SYSTEM "fonts.dtd">' \
              '<fontconfig>' \
              '  <match target="pattern"><test name="family"><string>Times New Roman</string></test>' \
              '  <edit name="family" mode="assign" binding="strong"><string>Liberation Serif</string></edit></match>' \
              '</fontconfig>' > /etc/fonts/local.conf
            fc-cache -f

      - name: Publish PDF + log to "latest" release (always)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: 最新编译
          fail_on_unmatched_files: false
          files: |
            main.pdf
            main.log

      - name: Upload artifacts (always)
        uses: actions/upload-artifact@v4
        with:
          name: report-build
          if-no-files-found: ignore
          path: |
            main.pdf
            main.log

      - name: Fail job if compile failed
        if: steps.compile.outcome != 'success'
        run: |
          echo "XeLaTeX 编译失败,main.log 已上传到 latest release / artifact" >&2
          exit 1
